<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BeatFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --accent: #7c6aff;
    --accent2: #ff6a9e;
    --text: #e8e8f0;
    --muted: #555566;
    --border: #222230;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }

  /* ── HEADER ── */
  header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .powered { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* ── MAIN ── */
  .main { padding: 20px; max-width: 760px; margin: 0 auto; width: 100%; padding-bottom: 90px; }
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 52px 14px 18px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,255,0.15); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .status { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-bottom: 14px; min-height: 16px; }
  .tracks { display: flex; flex-direction: column; gap: 3px; }
  .track { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s; animation: fadeUp 0.25s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .track:hover, .track:active { background: var(--surface2); border-color: var(--accent); }
  .track.active { background: var(--surface2); border-color: var(--accent); }
  .track-num { font-size: 11px; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
  .track.active .track-num { color: var(--accent); }
  .track-thumb { width: 52px; height: 38px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-channel { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── MINI PLAYER BAR ── */
  .mini-player { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17,17,24,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 10px 16px; z-index: 100; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); cursor: pointer; }
  .mini-player.visible { transform: translateY(0); }
  .mini-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .mini-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-channel { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .mini-controls { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .mini-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text); }
  .mini-btn.pp { background: linear-gradient(135deg, var(--accent), var(--accent2)); width: 38px; height: 38px; border-radius: 50%; color: white; }
  .mini-btn svg { width: 18px; height: 18px; fill: currentColor; }
  .mini-btn.pp svg { width: 20px; height: 20px; }
  .mini-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s linear; }

  /* ── FULL SCREEN PLAYER ── */
  .full-player {
    position: fixed; inset: 0; z-index: 300;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    overflow: hidden;
  }
  .full-player.open { transform: translateY(0); }

  .fp-bg {
    position: absolute; inset: 0;
    background: var(--bg);
    z-index: 0;
  }
  .fp-bg-art {
    position: absolute; inset: -20px;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(0.3) saturate(2);
    z-index: 0;
    transition: background-image 0.5s;
  }

  .fp-inner { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100%; padding: 0 24px 40px; }

  /* drag handle */
  .fp-handle { width: 36px; height: 4px; background: var(--muted); border-radius: 4px; margin: 14px auto 0; flex-shrink: 0; cursor: pointer; }

  /* top bar */
  .fp-topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 0; flex-shrink: 0; }
  .fp-down { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; display: flex; align-items: center; }
  .fp-down svg { width: 24px; height: 24px; fill: currentColor; }
  .fp-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

  /* art */
  .fp-art-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 0 16px; }
  .fp-art { width: min(280px, 72vw); height: min(280px, 72vw); border-radius: 16px; object-fit: cover; background: var(--surface2); box-shadow: 0 24px 60px rgba(0,0,0,0.6); transition: transform 0.3s; }
  .fp-art.playing { transform: scale(1.04); }

  /* info */
  .fp-info { text-align: center; margin-bottom: 24px; flex-shrink: 0; }
  .fp-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 6px; line-height: 1.2; padding: 0 8px; }
  .fp-channel { font-size: 13px; color: var(--muted); }

  /* progress */
  .fp-progress-wrap { margin-bottom: 8px; flex-shrink: 0; }
  .fp-bar { width: 100%; height: 4px; background: var(--border); border-radius: 4px; cursor: pointer; position: relative; margin-bottom: 8px; }
  .fp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; width: 0%; transition: width 0.4s linear; position: relative; }
  .fp-fill::after { content: ''; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 0 6px rgba(124,106,255,0.6); }
  .fp-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

  /* controls */
  .fp-controls { display: flex; align-items: center; justify-content: center; gap: 20px; flex-shrink: 0; }
  .fp-btn { background: none; border: none; cursor: pointer; color: var(--text); padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; }
  .fp-btn:hover { background: var(--surface2); transform: scale(1.1); }
  .fp-btn svg { width: 28px; height: 28px; fill: currentColor; }
  .fp-btn.big { background: linear-gradient(135deg, var(--accent), var(--accent2)); width: 68px; height: 68px; box-shadow: 0 8px 24px rgba(124,106,255,0.4); }
  .fp-btn.big svg { width: 32px; height: 32px; fill: white; }
  .fp-btn.big:hover { transform: scale(1.05); }

  /* tap overlay */
  .tap-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.88); z-index: 400; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .tap-overlay.show { display: flex; }
  .tap-art { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
  .tap-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; text-align: center; padding: 0 32px; }
  .tap-ch { font-size: 12px; color: var(--muted); }
  .tap-btn { margin-top: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 50px; padding: 16px 48px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: white; cursor: pointer; }
  .tap-cancel { font-size: 12px; color: var(--muted); cursor: pointer; margin-top: 4px; }

  /* hidden yt */
  #yt-container { position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-state .big { font-size: 44px; margin-bottom: 10px; }
  .empty-state p { font-size: 12px; letter-spacing: 1px; }
  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: blink 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>

<header>
  <div class="logo">BeatFlow</div>
  <div class="powered">YouTube</div>
</header>

<div class="main">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search songs, artists..." autocomplete="off"/>
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="6"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </button>
  </div>
  <div class="status" id="status">— search anything to start —</div>
  <div class="tracks" id="trackList">
    <div class="empty-state">
      <div class="big">🎵</div>
      <p>Search for music to start playing</p>
    </div>
  </div>
</div>

<!-- Hidden YT -->
<div id="yt-container"><div id="ytPlayer"></div></div>

<!-- Mini Player -->
<div class="mini-player" id="miniPlayer" onclick="openFullPlayer()">
  <div class="mini-progress" id="miniProgress"></div>
  <div class="mini-inner">
    <img class="mini-thumb" id="miniThumb" src="" alt=""/>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle">—</div>
      <div class="mini-channel" id="miniChannel">—</div>
    </div>
    <div class="mini-controls" onclick="event.stopPropagation()">
      <button class="mini-btn" onclick="playPrev()">
        <svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg>
      </button>
      <button class="mini-btn pp" onclick="togglePlay()">
        <svg id="miniPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="mini-btn" onclick="playNext()">
        <svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0h-2v16h2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Full Screen Player -->
<div class="full-player" id="fullPlayer">
  <div class="fp-bg"></div>
  <div class="fp-bg-art" id="fpBgArt"></div>
  <div class="fp-inner">
    <div class="fp-handle" onclick="closeFullPlayer()"></div>
    <div class="fp-topbar">
      <button class="fp-down" onclick="closeFullPlayer()">
        <svg viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="fp-label">Now Playing</div>
      <div style="width:32px"></div>
    </div>
    <div class="fp-art-wrap">
      <img class="fp-art" id="fpArt" src="" alt=""/>
    </div>
    <div class="fp-info">
      <div class="fp-title" id="fpTitle">—</div>
      <div class="fp-channel" id="fpChannel">—</div>
    </div>
    <div class="fp-progress-wrap">
      <div class="fp-bar" onclick="seek(event)" id="fpBar">
        <div class="fp-fill" id="fpFill"></div>
      </div>
      <div class="fp-times">
        <span id="fpCurrent">0:00</span>
        <span id="fpTotal">0:00</span>
      </div>
    </div>
    <div class="fp-controls">
      <button class="fp-btn" onclick="playPrev()">
        <svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg>
      </button>
      <button class="fp-btn big" onclick="togglePlay()">
        <svg id="fpPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="fp-btn" onclick="playNext()">
        <svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0h-2v16h2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Tap overlay -->
<div class="tap-overlay" id="tapOverlay">
  <img class="tap-art" id="tapArt" src="" alt=""/>
  <div class="tap-title" id="tapTitle"></div>
  <div class="tap-ch" id="tapCh"></div>
  <button class="tap-btn" onclick="confirmPlay()">▶ Play</button>
  <div class="tap-cancel" onclick="cancelTap()">Cancel</div>
</div>

<script>
const API_KEY = 'AIzaSyDGgbD0NMJwtN8DGBoPIGoo5nele_mRSmY';
let results = [], currentIdx = -1, pendingIdx = -1;
let ytPlayer = null, isPlaying = false, progressInterval = null, playerReady = false;

(function(){ const s = document.createElement('script'); s.src = 'https://www.youtube.com/iframe_api'; document.head.appendChild(s); })();

window.onYouTubeIframeAPIReady = () => {
  ytPlayer = new YT.Player('ytPlayer', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, playsinline: 1, controls: 0 },
    events: { onReady: () => { playerReady = true; }, onStateChange: onStateChange }
  });
};

function onStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true; setIcons('pause'); startProgress();
    document.getElementById('fpArt').classList.add('playing');
  } else if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false; setIcons('play'); clearInterval(progressInterval);
    document.getElementById('fpArt').classList.remove('playing');
  } else if (e.data === YT.PlayerState.ENDED) {
    playNext();
  }
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  setStatus('<span class="loading-dots"><span></span><span></span><span></span></span> Searching...');
  document.getElementById('trackList').innerHTML = '';
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q+' song')}&type=video&maxResults=20&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) { setStatus('Error: '+data.error.message); return; }
    results = (data.items||[]).filter(i=>i.id&&i.id.videoId);
    renderTracks();
    setStatus(`${results.length} results for "${q}"`);
  } catch(e) { setStatus('Network error — try again'); }
}

function renderTracks() {
  const list = document.getElementById('trackList');
  if (!results.length) { list.innerHTML='<div class="empty-state"><div class="big">😶</div><p>No results</p></div>'; return; }
  list.innerHTML = results.map((item,i) => `
    <div class="track ${i===currentIdx?'active':''}" onclick="selectTrack(${i})" style="animation-delay:${i*0.02}s">
      <div class="track-num">${i===currentIdx?'▶':i+1}</div>
      <img class="track-thumb" src="${item.snippet.thumbnails.default.url}" alt="" loading="lazy"/>
      <div class="track-info">
        <div class="track-title">${item.snippet.title}</div>
        <div class="track-channel">${item.snippet.channelTitle}</div>
      </div>
    </div>
  `).join('');
}

function selectTrack(idx) {
  pendingIdx = idx;
  const item = results[idx];
  document.getElementById('tapArt').src = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default.url;
  document.getElementById('tapTitle').textContent = item.snippet.title;
  document.getElementById('tapCh').textContent = item.snippet.channelTitle;
  document.getElementById('tapOverlay').classList.add('show');
}

function confirmPlay() {
  document.getElementById('tapOverlay').classList.remove('show');
  playTrack(pendingIdx);
  openFullPlayer();
}

function cancelTap() { document.getElementById('tapOverlay').classList.remove('show'); }

function playTrack(idx) {
  currentIdx = idx;
  const item = results[idx];
  const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default.url;

  // Mini player
  document.getElementById('miniTitle').textContent = item.snippet.title;
  document.getElementById('miniChannel').textContent = item.snippet.channelTitle;
  document.getElementById('miniThumb').src = thumb;
  document.getElementById('miniPlayer').classList.add('visible');

  // Full player
  document.getElementById('fpTitle').textContent = item.snippet.title;
  document.getElementById('fpChannel').textContent = item.snippet.channelTitle;
  document.getElementById('fpArt').src = thumb;
  document.getElementById('fpBgArt').style.backgroundImage = `url(${thumb})`;

  // Reset progress
  document.getElementById('fpFill').style.width = '0%';
  document.getElementById('miniProgress').style.width = '0%';
  document.getElementById('fpCurrent').textContent = '0:00';
  document.getElementById('fpTotal').textContent = '0:00';

  setStatus('Now playing: '+item.snippet.title);
  renderTracks();

  if (ytPlayer && playerReady) {
    ytPlayer.loadVideoById(item.id.videoId);
    ytPlayer.playVideo();
  }
}

function togglePlay() {
  if (!ytPlayer || !playerReady) return;
  isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
}

function playNext() { if (currentIdx < results.length-1) playTrack(currentIdx+1); }
function playPrev() { if (currentIdx > 0) playTrack(currentIdx-1); }

function seek(e) {
  if (!ytPlayer || !ytPlayer.getDuration) return;
  const ratio = e.offsetX / e.currentTarget.offsetWidth;
  ytPlayer.seekTo(ratio * ytPlayer.getDuration(), true);
}

function startProgress() {
  clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!ytPlayer || !ytPlayer.getCurrentTime) return;
    const cur = ytPlayer.getCurrentTime(), dur = ytPlayer.getDuration();
    if (!dur) return;
    const pct = (cur/dur*100)+'%';
    document.getElementById('fpFill').style.width = pct;
    document.getElementById('miniProgress').style.width = pct;
    document.getElementById('fpCurrent').textContent = fmt(cur);
    document.getElementById('fpTotal').textContent = fmt(dur);
  }, 500);
}

function openFullPlayer() {
  document.getElementById('fullPlayer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFullPlayer() {
  document.getElementById('fullPlayer').classList.remove('open');
  document.body.style.overflow = '';
}

function setIcons(state) {
  const path = state==='pause' ? '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  document.getElementById('miniPlayIcon').innerHTML = path;
  document.getElementById('fpPlayIcon').innerHTML = path;
}

function fmt(s) { if(!s||isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
function setStatus(h) { document.getElementById('status').innerHTML = h; }

document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

// Swipe down to close full player
let touchStartY = 0;
document.getElementById
