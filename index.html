<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="BeatFlow — a beautiful YouTube-powered music player with liked songs, shuffle, repeat, and queue."/>
  <title>BeatFlow — Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ─────────────────────────────────────────
     APP SHELL
───────────────────────────────────────── -->
<div class="app-shell">

  <!-- ─── LEFT SIDEBAR (desktop) ─── -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo-wrap">
      <div class="sidebar-logo-glow"></div>
      <div class="logo">BeatFlow</div>
    </div>

    <!-- Nav links -->
    <nav class="sidebar-nav" role="tablist" aria-label="Views">
      <button class="nav-btn active" id="tab-search" role="tab" aria-selected="true" data-tab="search">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </span>
        <span class="nav-label">Search</span>
      </button>
      <button class="nav-btn" id="tab-liked" role="tab" aria-selected="false" data-tab="liked">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </span>
        <span class="nav-label">Liked Songs</span>
      </button>
      <button class="nav-btn" id="tab-queue" role="tab" aria-selected="false" data-tab="queue">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </span>
        <span class="nav-label">Queue</span>
      </button>
    </nav>

    <!-- Sidebar footer -->
    <div class="sidebar-footer">
      <span class="powered-by">Powered by YouTube</span>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ─── -->
  <div class="main-content">

    <!-- Content header (inside main) -->
    <div class="content-header" id="contentHeader">
      <div class="view-title" id="viewTitle">Search</div>
    </div>

    <!-- Search wrap (only shown in search tab) -->
    <div class="search-wrap" id="searchWrap">
      <div class="search-inner">
        <svg class="search-icon-inline" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="What do you want to listen to?" autocomplete="off" aria-label="Search music"/>
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status" id="status"></div>

    <!-- Empty state (shown when search tab has no results yet) -->
    <div class="empty-home" id="emptyHome">
      <div class="empty-home-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <h2 class="empty-home-title">What do you want to listen to?</h2>
      <p class="empty-home-sub">Search for songs, artists, or anything you're in the mood for.</p>
    </div>

    <!-- Track list (shared container for all views) -->
    <main class="main" role="main">
      <div class="tracks-table" id="trackList" role="list"></div>
    </main>

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<!-- ─────────────────────────────────────────
     HIDDEN YT PLAYER
───────────────────────────────────────── -->
<div id="yt-container"><div id="ytPlayer"></div></div>

<!-- ─────────────────────────────────────────
     BOTTOM PLAYER BAR (desktop + mobile)
───────────────────────────────────────── -->
<div class="mini-player" id="miniPlayer" role="region" aria-label="Mini Player">
  <!-- Thin progress line at top -->
  <div class="mini-progress-bar">
    <div class="mini-progress" id="miniProgress"></div>
  </div>

  <div class="mini-inner">
    <!-- Track info -->
    <div class="mini-track-info">
      <img class="mini-thumb" id="miniThumb" src="" alt="Album art"/>
      <div class="mini-info">
        <div class="mini-title" id="miniTitle">—</div>
        <div class="mini-channel" id="miniChannel">—</div>
      </div>
    </div>

    <!-- Controls (center) -->
    <div class="mini-controls" id="miniControls">
      <button class="mini-btn" id="miniPrevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg>
      </button>
      <button class="mini-btn pp" id="miniPlayBtn" aria-label="Play / Pause">
        <svg id="miniPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="mini-btn" id="miniNextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0h-2v16h2z"/></svg>
      </button>
    </div>

    <!-- Right side: expand icon -->
    <div class="mini-right">
      <button class="mini-expand-btn" id="miniExpandBtn" aria-label="Open full player">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ─────────────────────────────────────────
     FULL SCREEN PLAYER
───────────────────────────────────────── -->
<div class="full-player" id="fullPlayer" role="dialog" aria-label="Full Player" aria-modal="true">
  <div class="fp-bg"></div>
  <div class="fp-bg-art" id="fpBgArt"></div>

  <div class="fp-inner">

    <!-- Drag handle -->
    <div class="fp-handle" id="fpHandle" role="button" aria-label="Close player" tabindex="0"></div>

    <!-- Top bar -->
    <div class="fp-topbar">
      <button class="fp-down" id="fpDownBtn" aria-label="Close full player">
        <svg viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div class="fp-label">Now Playing</div>
      <div style="width:32px"></div>
    </div>

    <!-- Album Art -->
    <div class="fp-art-wrap">
      <img class="fp-art" id="fpArt" src="" alt="Album art"/>
    </div>

    <!-- Info + Like -->
    <div class="fp-info-row">
      <div class="fp-info">
        <div class="fp-title" id="fpTitle">—</div>
        <div class="fp-channel" id="fpChannel">—</div>
      </div>
      <button class="fp-like-btn" id="fpLikeBtn" aria-label="Like" title="Like">
        <svg viewBox="0 0 24 24"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
      </button>
    </div>

    <!-- Progress bar -->
    <div class="fp-progress-wrap">
      <div class="fp-bar" id="fpBar" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100">
        <div class="fp-fill" id="fpFill"></div>
      </div>
      <div class="fp-times">
        <span id="fpCurrent">0:00</span>
        <span id="fpTotal">0:00</span>
      </div>
    </div>

    <!-- Main Controls -->
    <div class="fp-controls">
      <!-- Shuffle -->
      <button class="fp-btn" id="shuffleBtn" aria-label="Shuffle" title="Shuffle">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>

      <!-- Prev -->
      <button class="fp-btn" id="fpPrevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="M19 20L9 12l10-8v16zM5 4h2v16H5z"/></svg>
      </button>

      <!-- Play / Pause -->
      <button class="fp-btn big" id="fpPlayBtn" aria-label="Play / Pause">
        <svg id="fpPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <!-- Next -->
      <button class="fp-btn" id="fpNextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="M5 4l10 8-10 8V4zm14 0h-2v16h2z"/></svg>
      </button>

      <!-- Repeat -->
      <button class="fp-btn" id="repeatBtn" aria-label="Repeat" title="Repeat">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>

    <!-- Volume Row -->
    <div class="fp-volume-row">
      <button class="fp-vol-icon" id="volIconBtn" aria-label="Mute / Unmute">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <input
        type="range"
        class="volume-slider"
        id="volumeSlider"
        min="0" max="100" value="80"
        aria-label="Volume"
        style="background-size: 80% 100%"
      />
      <span class="vol-label" id="volLabel">80%</span>
    </div>

  </div><!-- /fp-inner -->
</div><!-- /full-player -->

<!-- ─────────────────────────────────────────
     TAP OVERLAY (confirm before play)
───────────────────────────────────────── -->
<div class="tap-overlay" id="tapOverlay" role="dialog" aria-modal="true" aria-label="Confirm play">
  <img class="tap-art" id="tapArt" src="" alt=""/>
  <div class="tap-title" id="tapTitle"></div>
  <div class="tap-ch" id="tapCh"></div>
  <button class="tap-btn" id="tapPlayBtn">▶ Play</button>
  <div class="tap-cancel" id="tapCancelBtn" role="button" tabindex="0">Cancel</div>
</div>

<!-- ─────────────────────────────────────────
     MOBILE BOTTOM NAV
───────────────────────────────────────── -->
<nav class="mobile-nav" role="navigation" aria-label="Mobile navigation">
  <button class="mobile-nav-btn active" id="mob-tab-search" data-tab="search">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <span>Search</span>
  </button>
  <button class="mobile-nav-btn" id="mob-tab-liked" data-tab="liked">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <span>Liked</span>
  </button>
  <button class="mobile-nav-btn" id="mob-tab-queue" data-tab="queue">
    <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
    <span>Queue</span>
  </button>
</nav>

<!-- ─────────────────────────────────────────
     SCRIPTS (order matters: storage → player → search → main)
───────────────────────────────────────── -->
<script src="js/storage.js"></script>
<script src="js/player.js"></script>
<script src="js/search.js"></script>
<script src="js/main.js"></script>

</body>
</html>
